<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SmartLMS — Teacher Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<!-- Modular CSS -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/themes.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/countdown.js"></script>
<script src="js/core.js"></script>
<script src="js/anti-cheat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://meet.jit.si/external_api.js"></script>
<script src="calendar_logic.js"></script>
<script src="js/teacher.js"></script>
<link rel="manifest" href="manifest.json">
</head>
<body class="teacher-dashboard">
<div class="app">
  <aside class="sidebar">
    <div class="brand">SmartLMS</div>
    <nav id="teacherNav">
      <button class="active" data-page="dashboard">🏠 <span>Dashboard</span></button>
      <button data-page="courses">📚 <span>Courses</span></button>
      <button data-page="materials">📂 <span>Materials</span></button>
      <button data-page="assignments">📝 <span>Assignments</span></button>
      <button data-page="grading">📊 <span>Grading Queue</span></button>
      <button data-page="gradebook">📒 <span>Grade Book</span></button>
      <button data-page="students">👥 <span>Students</span></button>
      <button data-page="discussions">💬 <span>Discussions</span></button>
      <button data-page="calendar">📅 <span>Calendar</span></button>
      <button data-page="quizzes">❓ <span>Quizzes</span></button>
      <button data-page="anticheat">🛡️ <span>Anti-Cheat</span></button>
      <button data-page="live">📹 <span>Live Classes</span></button>
      <button data-page="settings">⚙️ <span>Settings</span></button>
      <button data-page="help">❓ <span>Help</span></button>
    </nav>
  </aside>
  <main class="main">
    <header class="dashboard-header">
      <div class="flex-center-y gap-10">
        <button id="sidebarToggle" class="button small">☰</button>
        <h1 class="m-0" style="font-size: 1.2rem;">Teacher Dashboard</h1>
      </div>
      <div class="header-right flex-center-y gap-20 ml-auto">
        <div class="notif-bell-container">
          <div id="notifBell" style="cursor:pointer;font-size:20px">🔔</div>
          <div id="unreadCount" class="unread-count" style="display:none">0</div>
          <div id="notifList" class="notif-list"></div>
        </div>
        <button id="logoutBtn" class="button secondary small w-auto">Logout</button>
      </div>
    </header>
    <div class="content-area">
      <div id="maintBanner" class="badge-warn" style="display:none; border-radius:6px; padding:6px 10px; margin-bottom:8px; text-align:center; font-size:13px"></div>
      <div id="pageContent"></div>
    </div>
  </main>
</div>

</body>
</html>
